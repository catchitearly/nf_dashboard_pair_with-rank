# ============================================================
# backtest.yml
# Fetches real Fyers 5-min historical data for the given date
# and runs the full strategy bar-by-bar — same logic as live.
#
# Inputs:
#   date  : YYYY-MM-DD to backtest
#   atm   : override ATM strike (optional — auto from 9:15 close if blank)
#
# Outputs:
#   - Full P&L report printed to job log
#   - docs/index.html updated with BACKTEST dashboard
#   - backtest_results.txt uploaded as artifact
#
# SECRETS REQUIRED (same as live trading — needs real Fyers data):
#   FYERS_CLIENT_ID
#   FYERS_ACCESS_TOKEN
#   TELEGRAM_BOT_TOKEN  (optional — alerts during backtest)
#   TELEGRAM_CHAT_ID    (optional)
# ============================================================

name: Backtest

on:
  workflow_dispatch:
    inputs:
      date:
        description: 'Date to backtest (YYYY-MM-DD)'
        required: true
        default: ''
      atm:
        description: 'Override ATM strike (optional, e.g. 24000 — leave blank for auto)'
        required: false
        default: ''

concurrency:
  group: backtest-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backtest:
    name: Backtest ${{ github.event.inputs.date }}
    runs-on: ubuntu-latest
    timeout-minutes: 15

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── Run backtest ───────────────────────────────────────
      - name: Run backtest
        env:
          FYERS_CLIENT_ID:    ${{ secrets.FYERS_CLIENT_ID }}
          FYERS_ACCESS_TOKEN: ${{ secrets.FYERS_ACCESS_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          DATE="${{ github.event.inputs.date }}"
          ATM="${{ github.event.inputs.atm }}"

          if [ -z "$DATE" ]; then
            echo "ERROR: date input is required"
            exit 1
          fi

          # Build command — add --atm only if provided
          CMD="python main.py --backtest --date $DATE"
          if [ -n "$ATM" ]; then
            CMD="$CMD --atm $ATM"
          fi

          echo "Running: $CMD"
          $CMD 2>&1 | tee backtest_results.txt

      # ── Write GitHub Actions job summary ──────────────────
      - name: Write job summary
        if: always()
        run: |
          {
            echo "## Backtest — \`${{ github.event.inputs.date }}\`"
            echo ""
            echo '```'
            grep -E "(=====|BACKTEST|Entry|Exit|Peak|P&L|Events|\[|ERROR|TOTAL)" \
              backtest_results.txt 2>/dev/null | head -60 \
              || cat backtest_results.txt | head -60
            echo '```'
            echo ""
            echo "**Dashboard:** Updated at \`docs/index.html\` (GitHub Pages)"
          } >> $GITHUB_STEP_SUMMARY

      # ── Commit dashboard back to repo ─────────────────────
      # The backtest writes docs/index.html with BACKTEST label —
      # commit it so GitHub Pages serves the latest backtest view.
      - name: Commit backtest dashboard
        if: always()
        run: |
          git config user.name  "trading-bot[bot]"
          git config user.email "trading-bot@noreply.github.com"
          git add docs/ logs/ 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No dashboard changes to commit."
            exit 0
          fi
          git commit -m "backtest: ${{ github.event.inputs.date }} run #${{ github.run_number }} [skip ci]"
          for attempt in 1 2 3; do
            git pull --rebase origin ${{ github.ref_name }} 2>/dev/null || true
            git push origin ${{ github.ref_name }} && \
              echo "✓ Push succeeded (attempt $attempt)" && break || \
              { echo "Push failed (attempt $attempt)"; sleep $((attempt * 3)); }
          done

      # ── Upload results as artifact ─────────────────────────
      - name: Upload backtest results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backtest-${{ github.event.inputs.date }}-run${{ github.run_number }}
          path: |
            backtest_results.txt
            docs/index.html
            logs/
          retention-days: 30
          if-no-files-found: ignore
