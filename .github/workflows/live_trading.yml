# ============================================================
# live_trading.yml
# Runs the trading bot every 5 minutes on weekdays during
# market hours (09:40–14:35 IST).
#
# After each run:
#   1. state/trading_state.json is committed back (persistence)
#   2. docs/index.html is committed back (GitHub Pages dashboard)
#   3. logs/ are committed back (audit trail)
#
# GitHub Pages setup (one-time):
#   Repo Settings → Pages → Source: "Deploy from branch"
#   Branch: main  Folder: /docs
#   Dashboard URL: https://<username>.github.io/<repo>/
#
# SECRETS REQUIRED:
#   FYERS_CLIENT_ID       Fyers app client ID
#   FYERS_ACCESS_TOKEN    Daily access token (auto-refreshed by token_refresh.yml)
#   TELEGRAM_BOT_TOKEN    From @BotFather
#   TELEGRAM_CHAT_ID      Your chat or channel ID
#   GH_PAT (optional)     PAT for pushing to protected branches
# ============================================================

name: Live Trading

on:
  
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual run'
        required: false
        default: 'manual'

# Only one live-trading job at a time — queue, never cancel
concurrency:
  group: live-trading-${{ github.ref }}
  cancel-in-progress: false

jobs:
  trade:
    name: Run trading cycle
    runs-on: ubuntu-latest
    timeout-minutes: 4

    permissions:
      contents: write
      pages:    write
      id-token: write

    steps:
      # ── 1. Checkout with full write access ───────────────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}

      # ── 2. Python setup ───────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # ── 3. Install dependencies ───────────────────────────
      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── 4. Run one trading cycle ──────────────────────────
      - name: Run trading cycle
        env:
          FYERS_CLIENT_ID:    ${{ secrets.FYERS_CLIENT_ID }}
          FYERS_ACCESS_TOKEN: ${{ secrets.FYERS_ACCESS_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py

      # ── 5. Commit state, dashboard, and logs back ─────────
      # Always runs — we always want latest state saved even if bot errored
      - name: Commit state and dashboard
        if: always()
        run: |
          git config user.name  "trading-bot[bot]"
          git config user.email "trading-bot@noreply.github.com"

          # Stage all outputs
          git add state/ docs/ logs/ 2>/dev/null || true

          # Skip commit if nothing changed
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "bot: run #${{ github.run_number }} $(date -u +'%H:%M UTC') [skip ci]"

          # Retry push with rebase to handle concurrent runs
          for attempt in 1 2 3; do
            git pull --rebase origin ${{ github.ref_name }} 2>/dev/null || true
            git push origin ${{ github.ref_name }} && \
              echo "✓ Push succeeded (attempt $attempt)" && break || \
              { echo "Push failed (attempt $attempt), retrying..."; sleep $((attempt * 3)); }
          done

      # ── 6. Upload logs as artifact ────────────────────────
      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trading-logs-${{ github.run_number }}
          path: logs/
          retention-days: 14
          if-no-files-found: ignore
